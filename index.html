<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Mi Tienda — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ... (MANTÉN TODO TU CSS IGUAL QUE ANTES PARA NO CAMBIAR EL DISEÑO) ... */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{ --ink:#0a0a0a;--ink-2:#1a1a1a;--ink-3:#2c2c2c; --smoke:#9a9a9a;--cream:#f5f0e8;--cream-2:#ede8df; --gold:#c9a84c;--gold-light:#e8d5a0;--white:#ffffff; --radius:4px;--t:.25s cubic-bezier(.4,0,.2,1); }
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.site-header{position:sticky;top:0;z-index:100;background:var(--ink)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:640px;margin:0 auto}
/* (Asegúrate de mantener el resto de tu CSS aquí) */
</style>
</head>
<body>

<header class="site-header"><div class="header-inner"><div class="brand"><span class="brand-name">MI TIENDA</span><span class="brand-tagline">Colección exclusiva</span></div><button class="cart-btn" id="cartBtn"><span class="cart-count" id="cartCount">0</span></button></div></header>
<section class="hero"><p class="hero-eyebrow">Nueva temporada</p><h1 class="hero-title">Todo lo que<br/><em>necesitas,</em><br/>aquí.</h1></section>
<nav class="categories" id="categoryNav"></nav>
<div class="search-wrap"><input class="search-input" id="searchInput" type="search" placeholder="Buscar producto…"/></div>
<div class="state-msg" id="stateMsg"><div class="spinner"></div><p>Cargando catálogo…</p></div>
<main class="product-grid" id="productGrid"></main>
<aside class="cart-panel" id="cartPanel">
  <div class="cart-header"><h2>Tu pedido</h2><button class="close-cart" id="closeCart">✕</button></div>
  <div class="cart-body" id="cartBody"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><strong id="cartTotal">$0</strong></div>
    <div class="client-form"><input class="form-input" id="clientName" type="text" placeholder="Tu nombre"/><input class="form-input" id="clientPhone" type="tel" placeholder="Tu número de WhatsApp"/></div>
    <button class="send-btn" id="sendBtn">Enviar pedido por WhatsApp</button>
  </div>
</aside>

<script>
// ── CONFIGURACIÓN ──
const CONFIG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxti64t_ZJHjsBQJHvpb1LJqKLr-P2zHFIKDJtIzwG2SRto2qOOwCzfxsfGx7OJj_D_/exec',
  WHATSAPP_NUMBER: '584149956831',
  STORE_NAME: 'Mi Tienda',
  CURRENCY: '$',
};

// (MANTÉN TODAS TUS FUNCIONES: loadProducts, render, openModal, addToCart, etc. IGUAL)
// ...

// ── ENVIAR WHATSAPP (AQUÍ ESTÁ EL CAMBIO) ──
$('sendBtn').addEventListener('click', async () => {
  const items = Object.values(cart);
  if (!items.length) { showToast('Agrega productos primero'); return; }
  const name  = $('clientName').value.trim();
  const phone = $('clientPhone').value.trim();
  if (!name) { showToast('Por favor ingresa tu nombre'); return; }
  
  const total = items.reduce((s,i) => s + i.product.precio*i.qty, 0);
  const lines = items.map(({product:p,qty}) => `• ${p.nombre} x${qty} — ${CONFIG.CURRENCY}${fmt(p.precio*qty)}`);
  const msg = [`🛍️ *Nuevo pedido*`, `👤 Cliente: ${name}`, `*Productos:*`, ...lines, `💰 *Total: ${CONFIG.CURRENCY}${fmt(total)}*`].join('\n');

  try {
    await fetch(CONFIG.SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify({
        action:'saveOrder',
        cliente:name, 
        telefono:phone,
        // ==============================================================
        // CAMBIO: Se añadió 'url_imagen: p.url_imagen' para enviarlo al servidor
        // ==============================================================
        items: items.map(({product:p,qty}) => ({
          id: p.id,
          nombre: p.nombre,
          qty: qty,
          precio: p.precio,
          url_imagen: p.url_imagen 
        })),
        total: total
      })
    });
  } catch(_){}

  window.open(`https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  cart = {};
  updateCartUI();
  closeCartPanel();
});

// (MANTÉN EL RESTO DEL CÓDIGO Y LAS FUNCIONES DE UTILIDAD AL FINAL)
// ...
</script>
</body>
</html>
